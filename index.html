  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <!-- Content Security Policy -->
  <!--
      Static-site CSP (meta tag — no server headers).
      - 'unsafe-inline'/'unsafe-eval' needed for React + Vite.
      - AWS WAF CAPTCHA JS SDK loads from *.awswaf.com (script + challenge frame + token API).
      - Contact form posts same-origin to /api/contact (served by CloudFront), so connect-src 'self'.
    -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.awswaf.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://*.awswaf.com; connect-src 'self' https://*.awswaf.com; img-src 'self' data: https:;" />
  
  <!-- Initialize theme before React loads to prevent flash -->
  <script>
    (function() {
      const theme = localStorage.getItem('theme');
      const isDark = theme !== 'light';
      if (isDark) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
