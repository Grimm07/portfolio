name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # VALIDATION JOB - Lint, typecheck, and test in one job
  # =============================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

  # =============================================================================
  # BACKEND TESTS - the AWS Lambda code is a separate npm workspace with its own
  # deps (aws-sdk-client-mock) and vitest config. The root validate job installs
  # only root deps, so backend tests must run here with backend deps installed.
  # =============================================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend type check
        working-directory: backend
        run: npm run typecheck

      - name: Run backend tests
        working-directory: backend
        run: npm test

  # =============================================================================
  # SECURITY AUDIT JOB - npm audit across all three workspaces
  # Starts NON-BLOCKING (|| true) to avoid breaking CI on pre-existing dev-tool
  # noise. TODO: remove the "|| true" and tighten to a hard gate now that all
  # three workspaces are confirmed clean (Plan S Tasks 1-4) and stay green.
  # =============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit root (frontend)
        run: npm audit --audit-level=high || true

      - name: Audit worker
        working-directory: worker
        run: npm audit --audit-level=high || true

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high || true

  # =============================================================================
  # BUILD JOB - Build frontend and worker, upload artifacts for reuse
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # Build frontend
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          # WAF CAPTCHA integration URL (public). Embedded statically by Vite at build time.
          VITE_WAF_INTEGRATION_URL: ${{ vars.VITE_WAF_INTEGRATION_URL }}
        run: npm run build

      # Upload artifact for downstream jobs (worker is retired in 2c — no longer built here)
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # =============================================================================
  # TERRAFORM VALIDATION - Downloads worker artifact, validates without backend
  # =============================================================================
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.12.1"

      - name: OpenTofu Format Check
        working-directory: terraform
        run: tofu fmt -check -recursive -diff

      - name: OpenTofu Init (no backend)
        working-directory: terraform
        run: tofu init -backend=false

      - name: OpenTofu Validate
        working-directory: terraform
        run: tofu validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
        with:
          tflint_version: latest

      - name: Init TFLint
        working-directory: terraform
        run: tflint --init

      - name: Run TFLint
        working-directory: terraform
        run: tflint --format compact

  # =============================================================================
  # DEPLOY - Post-2c cutover: OpenTofu apply (AWS edge + DNS) via GitHub OIDC, then ship the
  # SPA to the static-site S3 bucket and invalidate CloudFront. The frontend now lives on AWS,
  # so it needs the tofu outputs (site_bucket, distribution_id) + AWS creds — hence one job.
  #
  # ⚠️ ONE-TIME PREREQS before apply succeeds: create the GitHub OIDC role
  #   (AWS_DEPLOY_ROLE_ARN), set TF_STATE_BUCKET, and migrate state to S3 once. The apply
  #   will DESTROY the Cloudflare Pages/Worker resources (2c) — review the plan in the logs.
  # =============================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate, test-backend, build, terraform]
    environment: production
    permissions:
      id-token: write # required for GitHub OIDC -> AWS
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: "1.12.1"

      - name: OpenTofu Init (S3 backend)
        working-directory: terraform
        run: tofu init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: OpenTofu Plan
        working-directory: terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_contact_email: ${{ secrets.CONTACT_EMAIL }}
        run: tofu plan -out=tfplan

      - name: OpenTofu Apply
        working-directory: terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_contact_email: ${{ secrets.CONTACT_EMAIL }}
        run: tofu apply -auto-approve tfplan

      - name: Read tofu outputs
        id: tf
        working-directory: terraform
        run: |
          echo "site_bucket=$(tofu output -raw site_bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(tofu output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to S3 + invalidate CloudFront
        env:
          SITE_BUCKET: ${{ steps.tf.outputs.site_bucket }}
          DISTRIBUTION_ID: ${{ steps.tf.outputs.distribution_id }}
        run: ./scripts/deploy-frontend.sh
