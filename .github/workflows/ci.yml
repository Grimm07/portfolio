name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # VALIDATION JOB - Lint, typecheck, and test in one job
  # =============================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

  # =============================================================================
  # SECURITY AUDIT JOB - npm audit on the frontend workspace. Starts NON-BLOCKING
  # (|| true) to avoid breaking CI on pre-existing dev-tool noise. TODO: remove the
  # "|| true" and tighten to a hard gate now that the workspace is confirmed clean.
  # (The contact backend now lives in the portfolio-backend repo, with its own CI.)
  # =============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit root (frontend)
        run: npm audit --audit-level=high || true

  # =============================================================================
  # BUILD JOB - Build the frontend, upload the artifact for reuse
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1
