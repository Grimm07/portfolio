name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  # =============================================================================
  # VALIDATION JOB - Lint, typecheck, and test in one job
  # =============================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

  # =============================================================================
  # BACKEND TESTS - the AWS Lambda code is a separate npm workspace with its own
  # deps (aws-sdk-client-mock) and vitest config. The root validate job installs
  # only root deps, so backend tests must run here with backend deps installed.
  # =============================================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend type check
        working-directory: backend
        run: npm run typecheck

      - name: Run backend tests
        working-directory: backend
        run: npm test

  # =============================================================================
  # SECURITY AUDIT JOB - npm audit across both workspaces (frontend + backend)
  # Starts NON-BLOCKING (|| true) to avoid breaking CI on pre-existing dev-tool
  # noise. TODO: remove the "|| true" and tighten to a hard gate now that both
  # workspaces are confirmed clean and stay green.
  # =============================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Audit root (frontend)
        run: npm audit --audit-level=high || true

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high || true

  # =============================================================================
  # BUILD JOB - Build the frontend, upload the artifact for reuse
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # =============================================================================
  # TERRAFORM VALIDATION - validates the AWS config without a backend
  # =============================================================================
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.1"

      - name: OpenTofu Format Check
        working-directory: terraform
        run: tofu fmt -check -recursive -diff

      - name: OpenTofu Init (no backend)
        working-directory: terraform
        run: tofu init -backend=false

      - name: OpenTofu Validate
        working-directory: terraform
        run: tofu validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Init TFLint
        working-directory: terraform
        run: tflint --init

      - name: Run TFLint
        working-directory: terraform
        run: tflint --format compact
