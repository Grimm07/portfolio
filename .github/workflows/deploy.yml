name: Deploy

# Ships the built static site to the shadowspire-owned S3 buckets behind CloudFront, via
# GitHub OIDC (no long-lived AWS keys). The buckets + distributions are owned/managed by the
# separate "infrastructure" repo — this workflow only PUTs content and invalidates the cache.
#
#   PR / feature branch  -> DEV  (GitHub Environment "dev",        account 176355979099)
#   push to main         -> PROD (GitHub Environment "production", account 681053994223)
#
# The WAF CAPTCHA integration URL (VITE_WAF_INTEGRATION_URL) is published by the infra repo to
# SSM /shadowspire/<env>/waf-integration-url; we read it after OIDC auth and embed it at build.
# The CloudFront distribution id is likewise read from SSM /shadowspire/<env>/cloudfront-distribution-id
# (single source of truth); the hardcoded DISTRIBUTION_ID env stays only as a fallback.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # DEV — feature-branch PRs. OIDC sub = repo:Grimm07/portfolio:environment:dev
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy DEV
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_ACCOUNT: "176355979099"
      SITE_BUCKET: shadowspire-dev-site-176355979099
      DISTRIBUTION_ID: EGFCTGJJEER89
      SSM_ENV: dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC, dev account)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::176355979099:role/portfolio-deploy
          aws-region: us-east-1

      - name: Read WAF + CloudFront distribution from SSM
        id: waf
        run: |
          URL=$(aws ssm get-parameter --name "/shadowspire/${SSM_ENV}/waf-integration-url" \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          KEY=$(aws ssm get-parameter --name "/shadowspire/${SSM_ENV}/waf-api-key" --with-decryption \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::warning::/shadowspire/${SSM_ENV}/waf-integration-url or waf-api-key not in SSM yet — deploying without CAPTCHA wired"
          fi
          # CloudFront distribution id (infra publishes it; fall back to the env default if absent).
          DIST=$(aws ssm get-parameter --name "/shadowspire/${SSM_ENV}/cloudfront-distribution-id" \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$DIST" ]; then
            echo "::warning::/shadowspire/${SSM_ENV}/cloudfront-distribution-id not in SSM — using the workflow's DISTRIBUTION_ID fallback"
          fi
          # The API key is a client-side value, but keep it out of plaintext logs.
          echo "::add-mask::$KEY"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "dist=${DIST:-$DISTRIBUTION_ID}" >> "$GITHUB_OUTPUT"

      - name: Build site
        env:
          VITE_WAF_INTEGRATION_URL: ${{ steps.waf.outputs.url }}
          VITE_WAF_API_KEY: ${{ steps.waf.outputs.key }}
        run: npm run build

      - name: Sync to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist/ "s3://${SITE_BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "${{ steps.waf.outputs.dist }}" --paths "/*"

  # ---------------------------------------------------------------------------
  # PROD — pushes to main. OIDC sub = repo:Grimm07/portfolio:environment:production
  # The "production" environment must require reviewers + restrict to the main branch.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy PROD
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCOUNT: "681053994223"
      SITE_BUCKET: shadowspire-prod-site-681053994223
      DISTRIBUTION_ID: E229NB0LSTX2V8
      SSM_ENV: prod
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC, prod account)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::681053994223:role/portfolio-deploy
          aws-region: us-east-1

      - name: Read WAF + CloudFront distribution from SSM
        id: waf
        run: |
          URL=$(aws ssm get-parameter --name "/shadowspire/${SSM_ENV}/waf-integration-url" \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          KEY=$(aws ssm get-parameter --name "/shadowspire/${SSM_ENV}/waf-api-key" --with-decryption \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          # PROD fails CLOSED: VITE_WAF_* are baked into the bundle at build time, so a missing
          # integration URL/key ships a contact form whose CAPTCHA can't initialize — every
          # POST /api/contact is then blocked by WAF (405 x-amzn-waf-action: captcha) and the
          # Lambda is never invoked. Refuse to deploy rather than ship a silently-broken form.
          # (Infra re-mints/republishes these to /shadowspire/prod/waf-*; if absent, fix infra
          # and re-run this deploy.) DEV intentionally stays fail-open so PR previews aren't blocked.
          if [ -z "$URL" ] || [ -z "$KEY" ]; then
            echo "::error::/shadowspire/${SSM_ENV}/waf-integration-url or waf-api-key missing/empty in SSM — refusing to deploy a contact form without CAPTCHA wired. Populate the params (infra) and re-run."
            exit 1
          fi
          # The API key is a client-side value, but keep it out of plaintext logs.
          echo "::add-mask::$KEY"
          # CloudFront distribution id (infra publishes it; fall back to the env default if absent).
          DIST=$(aws ssm get-parameter --name "/shadowspire/${SSM_ENV}/cloudfront-distribution-id" \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$DIST" ]; then
            echo "::warning::/shadowspire/${SSM_ENV}/cloudfront-distribution-id not in SSM — using the workflow's DISTRIBUTION_ID fallback"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "dist=${DIST:-$DISTRIBUTION_ID}" >> "$GITHUB_OUTPUT"

      - name: Build site
        env:
          VITE_WAF_INTEGRATION_URL: ${{ steps.waf.outputs.url }}
          VITE_WAF_API_KEY: ${{ steps.waf.outputs.key }}
        run: npm run build

      - name: Sync to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist/ "s3://${SITE_BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "${{ steps.waf.outputs.dist }}" --paths "/*"
