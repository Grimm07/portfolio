name: Deploy

# Ships the built static site to the shadowspire-owned S3 buckets behind CloudFront, via
# GitHub OIDC (no long-lived AWS keys). The buckets + distributions are owned/managed by the
# separate "infrastructure" repo — this workflow only PUTs content and invalidates the cache.
#
#   PR / feature branch  -> DEV  (GitHub Environment "dev",        account 176355979099)
#   push to main         -> PROD (GitHub Environment "production", account 681053994223)
#
# The WAF CAPTCHA integration URL (VITE_WAF_INTEGRATION_URL) is published by the infra repo to
# SSM /portfolio/<env>/waf-integration-url; we read it after OIDC auth and embed it at build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # DEV — feature-branch PRs. OIDC sub = repo:Grimm07/portfolio:environment:dev
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: Deploy DEV
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_ACCOUNT: "176355979099"
      SITE_BUCKET: shadowspire-dev-site-176355979099
      DISTRIBUTION_ID: EGFCTGJJEER89
      SSM_ENV: dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC, dev account)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::176355979099:role/portfolio-deploy
          aws-region: us-east-1

      - name: Build contact Lambda bundle
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.1"

      - name: Apply backend Terraform (dev)
        working-directory: terraform
        run: |
          tofu init -reconfigure -backend-config=backend-dev.hcl
          tofu apply -auto-approve -var "environment=dev" -var "contact_email=${{ secrets.CONTACT_EMAIL }}" -var "cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" -var "cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Read WAF CAPTCHA integration URL from SSM
        id: waf
        run: |
          URL=$(aws ssm get-parameter --name "/portfolio/${SSM_ENV}/waf-integration-url" \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "::warning::/portfolio/${SSM_ENV}/waf-integration-url not in SSM yet — deploying without CAPTCHA wired"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build site
        env:
          VITE_WAF_INTEGRATION_URL: ${{ steps.waf.outputs.url }}
        run: npm run build

      - name: Sync to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist/ "s3://${SITE_BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*"

  # ---------------------------------------------------------------------------
  # PROD — pushes to main. OIDC sub = repo:Grimm07/portfolio:environment:production
  # The "production" environment must require reviewers + restrict to the main branch.
  # ---------------------------------------------------------------------------
  deploy-prod:
    name: Deploy PROD
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCOUNT: "681053994223"
      SITE_BUCKET: shadowspire-prod-site-681053994223
      DISTRIBUTION_ID: E229NB0LSTX2V8
      SSM_ENV: prod
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC, prod account)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::681053994223:role/portfolio-deploy
          aws-region: us-east-1

      - name: Build contact Lambda bundle
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.12.1"

      - name: Apply backend Terraform (prod)
        working-directory: terraform
        run: |
          tofu init -reconfigure -backend-config=backend-prod.hcl
          tofu apply -auto-approve -var "environment=prod" -var "contact_email=${{ secrets.CONTACT_EMAIL }}" -var "cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" -var "cloudflare_zone_id=${{ secrets.CLOUDFLARE_ZONE_ID }}"

      - name: Read WAF CAPTCHA integration URL from SSM
        id: waf
        run: |
          URL=$(aws ssm get-parameter --name "/portfolio/${SSM_ENV}/waf-integration-url" \
                  --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            echo "::warning::/portfolio/${SSM_ENV}/waf-integration-url not in SSM yet — deploying without CAPTCHA wired"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build site
        env:
          VITE_WAF_INTEGRATION_URL: ${{ steps.waf.outputs.url }}
        run: npm run build

      - name: Sync to S3 + invalidate CloudFront
        run: |
          aws s3 sync dist/ "s3://${SITE_BUCKET}/" --delete
          aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths "/*"
